<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>お問い合わせ - いちご農園 haruka's FARM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/main.css">
  <script src="js/app.js"></script>
  <!-- YOUR WOVN SCRIPT -->
</head>
<body>
    <header>
    <h1>お問い合わせ</h1>
    <nav>
      <a href="index.html">ホーム</a> / 
      <a href="about.html">農園について</a> / 
      <a href="contents/content1.html">いちごの品種</a> / 
      <a href="contents/content2.html">いちご狩り</a> / 
      <a href="contact.html">お問い合わせ</a>
    </nav>
  </header>

  <div>
    いちご狩りの予約やお問い合わせはこちらから。実際には送信されません（テスト用）。
  </div>

    <form id="contact-form" class="bg-section">
        <label for="name">名前:</label>
        <input type="text" id="name" name="name" required /><br />

        <label for="email">メール:</label>
        <input type="email" id="email" name="email" required /><br />

        <label for="phone">電話番号:</label>
        <input type="tel" id="phone" name="phone" required /><br />

        <label for="message">お問い合わせ内容（いちご狩り予約、商品について等）:</label>
        <textarea id="message" name="message" required></textarea><br />

        <button type="button" id="confirm-button" class="button" onclick="showConfirmElement()">確認</button>
    </form>

    <!-- 「確認」ボタンをクリックしたら以下が表示される -->
    <div id="confirm-element" class="bg-section bg-section--confirm">
        <h2>確認内容</h2>
        以下を確認してください。
        <table>
            <tr>
                <td>名前：</td>
                <td id="confirm-name"></td>
            </tr>
            <tr>
                <td>メール：</td>
                <td id="confirm-email"></td>
            </tr>
            <tr>
                <td>電話：</td>
                <td id="confirm-phone"></td>
            </tr>
            <tr>
                <td>メッセージ：</td>
                <td id="confirm-message"></td>
            </tr>
            <tr>
                <td>送信日時：</td>
                <td id="confirm-datetime"></td>
            </tr>
        </table>
        <button type="button" id="submit-button" onclick="showCompleteElement()">送信</button>
    </div>

    <div id="complete-element" class="bg-section bg-section--complete">
        <h2>お問い合わせありがとうございます。</h2>
        <p>こちらはテストのため、実際には送信されていません。</p>
        <a href="index.html" class="button">TOPへ戻る</a>
    </div>
</body>
</html>
